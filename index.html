table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 8px;color:var(--mt);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;border-bottom:1px solid var(--bd2);white-space:nowrap;text-align:left}
td{padding:8px;border-bottom:1px solid #21262d55;vertical-align:middle}
/* HEADER */
.hdr{background:rgba(22,27,34,.95);border-bottom:0.5px solid var(--bd2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.hdr-title{font-family:var(--font-head);font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-title span{color:var(--ac)}
/* NAV */

.nav-btn{flex:1;padding:10px 4px;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
/* CONTENT */
.content{padding:14px;max-width:700px;margin:0 auto;padding-bottom:28px}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:rgba(255,255,255,.04);border:0.5px solid var(--bd2);border-radius:12px;padding:13px 14px;transition:transform .2s}

.kpi-sub{font-size:10px;color:var(--mt);margin-top:3px}
.bar-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:9px;overflow:hidden}

.filt-btn{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;margin-right:5px;margin-bottom:6px;font-family:var(--font-body)}
.row-space{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.preview-box{background:var(--bg3);border-radius:8px;padding:10px;font-size:12px;margin-top:4px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px}
.alert-err{background:#7f1d1d33;border:1px solid var(--rd);color:var(--rd)}
.alert-ok{background:#14532d33;border:1px solid var(--gn);color:var(--gn)}

.rank-bar-fill{height:100%;background:var(--gn);border-radius:2px}

.mes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(68px,1fr));gap:6px}
.mes-card{background:var(--bg3);border:0.5px solid var(--bd2);border-radius:10px;padding:10px 8px;text-align:center;transition:border-color .15s}

.mes-val{font-family:var(--font-head);font-size:12px;font-weight:700}
/* STATUS GRID */
.st-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.st-card{text-align:center;padding:8px 4px;background:var(--bg3);border-radius:8px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.spinner{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 1s linear infinite;display:inline-block}

async function carregarDados(){

function buildDash(){
  const sh=APP.shows,de=APP.desps,rc=APP.receitas;
  const ativos=sh.filter(s=>s.status!=='CANCELADO');
  const recebidos=sh.filter(s=>s.status==='RECEBIDO');
  const abertos=sh.filter(s=>['ABERTO','CONFIRMADO','SINAL PAGO'].includes(s.status));
  const con=sh.filter(s=>s.status==='CONFIRMADO');
  // KPIs
  const tRecBruta=rc.reduce((t,r)=>t+(r.valor||0),0);
  const tLiq=ativos.filter(s=>s.cache>0).reduce((t,s)=>t+calcLiq(s),0);
  const tRecebido=recebidos.reduce((t,s)=>t+(s.cache||0),0);
  const tAberto=abertos.reduce((t,s)=>t+(s.cache||0),0);
  const tD=de.reduce((t,d)=>t+(d.valor||0),0);
  const tSaldo=tRecBruta-tD;
  // Top shows por cachê bruto
  const rank=[...sh].filter(s=>s.cache>0&&s.status!=='CANCELADO').sort((a,b)=>b.cache-a.cache).slice(0,5);
  const maxC=rank[0]?.cache||1;
  // Receita mensal da aba receitas
  const mensal=MESES.map((m,i)=>{
    const v=rc.filter(r=>r.data&&+r.data.split('-')[1]===i+1).reduce((t,r)=>t+(r.valor||0),0);

       [`Cachê líquido`,R2(tLiq),'Cachê dos shows','var(--ac)',null],
       [`Recebido`,R2(tRecebido),`${recebidos.length} show${recebidos.length!==1?'s':''}`,'var(--gn)',null],
       [`Em aberto`,R2(tAberto),`${abertos.length} show${abertos.length!==1?'s':''}`,'var(--rd)',null],

  <div class="card" style="margin-bottom:10px">
    <div class="stitle">Status dos shows</div>
    <div class="st-grid">
      ${[['REC.',recebidos.length,'var(--gn)'],['ABERTO',sh.filter(s=>s.status==='ABERTO').length,'var(--rd)'],['CONF.',con.length,'var(--ac)'],
         ['SINAL',sh.filter(s=>s.status==='SINAL PAGO').length,'var(--pu)'],
         ['CANC.',sh.filter(s=>s.status==='CANCELADO').length,'var(--mt)'],['TOTAL',sh.length,'var(--tx)']

        <div style="font-size:9px;color:var(--mt);margin-top:2px">${x.n} lançamento${x.n!==1?'s':''}</div>

  <!-- Ranking top 5 -->
  <div class="card">
    <div class="stitle">🏆 Top 5 shows — cachê bruto</div>
    ${rank.length===0?`<div style="color:var(--mt);font-size:13px;text-align:center;padding:12px">Cadastre cachês nos shows para ver o ranking.</div>`:
    rank.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:${i<rank.length-1?'0.5px solid var(--bd2)':'none'}">

      <span>Total despesas</span><span style="color:var(--rd);font-family:monospace">${R(tD)}</span>
    </div>
  </div>`:''}`;
}

function drawChart(){
  const ctx=document.getElementById('chartMensal');
  if(!ctx)return;
  if(APP.chart){APP.chart.destroy();APP.chart=null;}
  const rc=APP.receitas;
  const data=MESES.map((m,i)=>rc.filter(r=>r.data&&+r.data.split('-')[1]===i+1).reduce((t,r)=>t+(r.valor||0),0));
  APP.chart=new Chart(ctx,{
    type:'bar',
    data:{labels:MESES,datasets:[{data,backgroundColor:data.map(v=>v>0?'rgba(31,111,235,.75)':'rgba(33,38,45,.6)'),borderRadius:5,borderSkipped:false}]},
    options:{
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+R(c.parsed.y)},backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e',padding:10,cornerRadius:8}},
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:10,family:'DM Sans'}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#8b949e',font:{size:9,family:'DM Sans'},callback:v=>v?`R$${(v/1000).toFixed(0)}K`:''},grid:{color:'rgba(33,38,45,.8)'},border:{display:false}}
      },
      responsive:true,maintainAspectRatio:false,animation:{duration:800}
    }
  });
}

function buildShows(){

    ${['todos','CONFIRMADO','ABERTO','RECEBIDO','SINAL PAGO','CANCELADO'].map(f=>`
    <button class="filt-btn" id="fst-${f.replace(' ','-')}" style="background:${APP.filtroSt===f?'rgba(88,166,255,.15)':'var(--bg2)'};color:${APP.filtroSt===f?'var(--ac)':'var(--mt)'};border:1px solid ${APP.filtroSt===f?'var(--ac)':'var(--bd2)'}">
      ${f==='todos'?'Todos':f}${f!=='todos'?` (${APP.shows.filter(s=>s.status===f).length})`:''}

      <div><span style="font-size:10px;color:var(--mt);font-family:monospace">${s.show_id} · </span><span style="font-size:14px;font-weight:600;font-family:var(--font-head)">${s.local}</span><span style="font-size:12px;color:var(--mt)"> — ${s.uf}</span></div>

function buildDesps(){
  const lista=[...APP.desps].sort((a,b)=>b.data?.localeCompare(a.data));

  return`

    ${total>0?`<span style="font-size:12px;color:var(--rd);font-weight:600;font-family:monospace">Total: ${R(total)}</span>`:'<span></span>'}

    <div><div style="font-size:13px;font-weight:500">${d.descricao||d.categoria}</div><div style="font-size:11px;color:var(--mt)">📅 ${fd(d.data)} · ${d.categoria}${d.show_ref?' · '+d.show_ref:''}</div></div>

function buildFluxo(){
  let ac=0;
  const rows=MESES.map((m,i)=>{
    const ent=APP.receitas.filter(r=>r.data&&+r.data.split('-')[1]===i+1).reduce((t,r)=>t+(r.valor||0),0);
    const sai=APP.desps.filter(d=>d.data&&+d.data.split('-')[1]===i+1).reduce((t,d)=>t+(d.valor||0),0);
    const sal=ent-sai;ac+=sal;return{m,ent,sai,sal,ac};
  });
  const tE=rows.reduce((t,r)=>t+r.ent,0);
  const tS=rows.reduce((t,r)=>t+r.sai,0);
  const saldo=tE-tS;
  return`
  <h2 style="font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px">Fluxo <span style="color:var(--ac)">de Caixa</span></h2>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
    ${[['Receitas',R2(tE),'var(--gn)'],['Despesas',R2(tS),'var(--rd)'],['Saldo',R2(saldo),saldo>=0?'var(--gn)':'var(--rd)']].map(([l,v,c])=>`
    <div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="color:${c};font-size:15px">${v}</div></div>`).join('')}
  </div>
  <div class="card" style="overflow-x:auto">
    <div class="stitle">Detalhamento mensal</div>
    <table><thead><tr>
      <th>Mês</th>
      <th style="text-align:right">Receitas</th>
      <th style="text-align:right">Despesas</th>
      <th style="text-align:right">Saldo</th>
      <th style="text-align:right">Acumulado</th>
    </tr></thead>
    <tbody>${rows.map((r,i)=>`<tr>
      <td style="font-weight:500;font-family:var(--font-head)">${MESES[i]}</td>
      <td style="text-align:right;color:${r.ent?'var(--gn)':'var(--mt)'};font-family:monospace">${r.ent?R(r.ent):'—'}</td>
      <td style="text-align:right;color:${r.sai?'var(--rd)':'var(--mt)'};font-family:monospace">${r.sai?'−'+R(r.sai):'—'}</td>
      <td style="text-align:right;color:${r.sal>0?'var(--gn)':r.sal<0?'var(--rd)':'var(--mt)'};font-weight:600;font-family:monospace">${r.sal===0?'—':(r.sal<0?'−':'')+R(Math.abs(r.sal))}</td>
      <td style="text-align:right;color:${r.ac>=0?'var(--ac)':'var(--rd)'};font-weight:700;font-family:monospace">${R(r.ac)}</td>
    </tr>`).join('')}</tbody></table>
  </div>`;
}

function bindEvents(){
  // LOGIN
  const bE=document.getElementById('btn-entrar');
  if(bE)bE.onclick=async()=>{
    const email=document.getElementById('l-email')?.value;
    const senha=document.getElementById('l-senha')?.value;
    if(!email||!senha){toast('Preencha e-mail e senha.','err');return;}
    APP.loading=true;render();
    const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
    APP.loading=false;
    if(error){toast('E-mail ou senha incorretos.','err');render();return;}
    APP.user=data.user;
    const{data:p}=await sb.from('perfis').select('perfil').eq('id',data.user.id).single();
    APP.role=p?.perfil||'viewer';
    await carregarDados();render();
  };
  const bIC=document.getElementById('btn-ir-cadastro');
  if(bIC)bIC.onclick=()=>{document.getElementById('cadastro-form').style.display='block';document.getElementById('login-form').style.display='none';};
  const bC=document.getElementById('btn-cadastrar');
  if(bC)bC.onclick=async()=>{
    const nome=document.getElementById('c-nome')?.value;
    const email=document.getElementById('c-email')?.value;
    const senha=document.getElementById('c-senha')?.value;
    if(!email||!senha){toast('Preencha e-mail e senha.','err');return;}
    const{error}=await sb.auth.signUp({email,password:senha,options:{data:{nome,role:'viewer'}}});
    if(error){toast(error.message,'err');render();return;}
    toast('Conta criada! Verifique seu e-mail.');render();
  };
  // SAIR
  const bS=document.getElementById('btn-sair');
  if(bS)bS.onclick=async()=>{if(APP.chart){APP.chart.destroy();APP.chart=null;}await sb.auth.signOut();APP.user=null;APP.role=null;APP.shows=[];APP.desps=[];APP.receitas=[];APP.tab='dash';render();};
  // NAV
  ['dash','shows','desps','receitas','fluxo','mapa'].forEach(t=>{const el=document.getElementById('nav-'+t);if(el)el.onclick=()=>{APP.tab=t;render();};});
  // FILTROS
  ['todos','CONFIRMADO','ABERTO','RECEBIDO','SINAL PAGO','CANCELADO'].forEach(f=>{const el=document.getElementById('fst-'+f.replace(' ','-'));if(el)el.onclick=()=>{APP.filtroSt=f;render();};});
  // IMPORTAR
  const bI=document.getElementById('btn-importar');if(bI)bI.onclick=importarShowsPadrao;
  // ADD SHOW
  const bAS=document.getElementById('btn-add-show');if(bAS)bAS.onclick=()=>{APP.modal={tipo:'show',novo:true,form:{status:'CONFIRMADO',uf:'CE',show_id:newSid()}};render();};
  // CLICK SHOW
  APP.shows.forEach(s=>{const el=document.getElementById('show-'+s.id);if(el)el.onclick=()=>{if(isAdmin()){APP.modal={tipo:'show',novo:false,form:{...s}};render();}else toast('Modo visualização.','err');};});
  // ADD DESP
  const bAD=document.getElementById('btn-add-desp');if(bAD)bAD.onclick=()=>{APP.modal={tipo:'desp',novo:true,form:{desp_id:newDid()}};render();};
  // CLICK DESP
  APP.desps.forEach(d=>{const el=document.getElementById('desp-'+d.id);if(el)el.onclick=()=>{if(isAdmin()){APP.modal={tipo:'desp',novo:false,form:{...d}};render();}};});
  // ADD RECEITA
  const bAR=document.getElementById('btn-add-receita');if(bAR)bAR.onclick=()=>{APP.modal={tipo:'receita',novo:true,form:{}};render();};
  // CLICK RECEITA
  APP.receitas.forEach(r=>{const el=document.getElementById('rec-'+r.id);if(el)el.onclick=()=>{if(isAdmin()){APP.modal={tipo:'receita',novo:false,form:{...r}};render();}};});
  // SALVAR RECEITA
  const bSR=document.getElementById('btn-salvar-rec');
  if(bSR)bSR.onclick=()=>{
    const f=APP.modal.form;
    f.data=document.getElementById('f-data')?.value||'';
    f.valor=+(document.getElementById('f-valor')?.value||0);
    f.tipo=document.getElementById('f-tipo')?.value||'';
    f.categoria=document.getElementById('f-cat')?.value||'';
    f.origem=document.getElementById('f-origem')?.value||'';

// ── MAPA ─────────────────────────────────────────────────────────
function buildMapa(){
  const sh = APP.shows;

  // Agregar por UF
  const agg = {};
  sh.forEach(s => {
    const uf = (s.uf||'').toUpperCase().trim();
    if(!uf) return;
    if(!agg[uf]) agg[uf] = {count:0, total:0};
    agg[uf].count++;
    agg[uf].total += parseFloat(s.cache)||0;
  });

  function getColor(n) {
    if(n===0) return '#1c2128';
    if(n===1) return '#1e3a5f';
    if(n===2) return '#1a4731';
    if(n===3) return '#1d4a2e';
    if(n===4) return '#2d6a4f';
    return '#3fb950';
  }

  const sorted = Object.entries(agg).sort((a,b)=>b[1].count-a[1].count).slice(0,6);
  const maxC = sorted[0]?.[1]?.count||1;

  const UF_FULL = {CE:'Ceará',PI:'Piauí',MA:'Maranhão',AM:'Amazonas',BA:'Bahia',
    PE:'Pernambuco',SP:'São Paulo',RJ:'Rio de Janeiro',RN:'R.G. Norte',
    PB:'Paraíba',AL:'Alagoas',SE:'Sergipe',GO:'Goiás',MT:'M. Grosso',
    MS:'M.G. Sul',PA:'Pará',AC:'Acre',AP:'Amapá',RR:'Roraima',
    RO:'Rondônia',TO:'Tocantins',MG:'M. Gerais',ES:'Esp. Santo',
    PR:'Paraná',SC:'S. Catarina',RS:'R.G. Sul',DF:'D. Federal'};

  const totalShows = sh.length;
  const totalUFs = Object.keys(agg).length;
  const totalBruto = sh.reduce((t,s)=>t+(parseFloat(s.cache)||0),0);

  const ranking = sorted.map(([uf,d],i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--bd2)">
      <span style="font-family:monospace;font-size:10px;color:var(--mt);min-width:18px;text-align:right">${String(i+1).padStart(2,'0')}</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span style="color:var(--tx)">${UF_FULL[uf]||uf}</span>
          <span style="color:var(--mt);font-family:monospace">${d.count} show${d.count>1?'s':''}</span>
        </div>
        <div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${(d.count/maxC*100).toFixed(0)}%;background:var(--gn);border-radius:2px"></div>
        </div>
      </div>
    </div>`).join('');

  return `
    <h2 style="font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px">
      Mapa <span style="color:var(--ac)">de Shows</span>
    </h2>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      ${[['Shows totais',totalShows,'var(--gn)'],['Estados',totalUFs,'var(--ac)'],['Receita bruta',R2(totalBruto),'var(--am)']].map(([l,v,c])=>`
      <div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="color:${c};font-size:16px">${v}</div></div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start">

      <div class="card" style="margin-bottom:0;padding:12px">
        <svg id="mapa-svg" viewBox="20 40 660 680" style="width:100%;height:auto;display:block"></svg>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="card" style="margin-bottom:0">
          <div class="stitle">Ranking por estado</div>
          ${ranking.length===0?'<div style="color:var(--mt);font-size:12px">Cadastre shows com UF para ver o ranking.</div>':ranking}
        </div>
        <div class="card" style="margin-bottom:0">
          <div class="stitle">Legenda</div>
          ${[['Nenhum show','#1c2128'],['1 show','#1e3a5f'],['2 shows','#1a4731'],['3 shows','#1d4a2e'],['4 shows','#2d6a4f'],['5+ shows','#3fb950']].map(([l,c])=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:var(--mt)">
            <div style="width:12px;height:12px;border-radius:2px;background:${c};flex-shrink:0"></div>${l}
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div id="mapa-tooltip" style="position:fixed;background:#161b22;border:1px solid var(--bd);border-radius:8px;padding:10px 14px;pointer-events:none;opacity:0;transition:opacity .12s;font-size:12px;min-width:160px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6)"></div>
  `;
}

function renderMapaSVG(){
  const svg = document.getElementById('mapa-svg');
  if(!svg) return;
  const tip = document.getElementById('mapa-tooltip');
  const sh = APP.shows;

  const agg = {};
  sh.forEach(s => {
    const uf = (s.uf||'').toUpperCase().trim();
    if(!uf) return;
    if(!agg[uf]) agg[uf] = {count:0, total:0};
    agg[uf].count++;
    agg[uf].total += parseFloat(s.cache)||0;
  });

  function getColor(n) {
    if(n===0) return '#1c2128';
    if(n===1) return '#1e3a5f';
    if(n===2) return '#1a4731';
    if(n===3) return '#1d4a2e';
    if(n===4) return '#2d6a4f';
    return '#3fb950';
  }

  const UF_FULL = {CE:'Ceará',PI:'Piauí',MA:'Maranhão',AM:'Amazonas',BA:'Bahia',
    PE:'Pernambuco',SP:'São Paulo',RJ:'Rio de Janeiro',RN:'Rio Grande do Norte',
    PB:'Paraíba',AL:'Alagoas',SE:'Sergipe',GO:'Goiás',MT:'Mato Grosso',
    MS:'Mato Grosso do Sul',PA:'Pará',AC:'Acre',AP:'Amapá',RR:'Roraima',
    RO:'Rondônia',TO:'Tocantins',MG:'Minas Gerais',ES:'Espírito Santo',
    PR:'Paraná',SC:'Santa Catarina',RS:'Rio Grande do Sul',DF:'Distrito Federal'};

  svg.innerHTML = '';

  STATES_GEO.forEach(st => {
    const data = agg[st.sigla] || {count:0, total:0};

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', st.d);
    path.setAttribute('fill', getColor(data.count));
    path.setAttribute('stroke','#21262d');
    path.setAttribute('stroke-width','0.8');
    path.style.cursor = 'pointer';
    path.style.transition = 'filter .15s';

    path.addEventListener('mousemove', e => {
      tip.innerHTML = `
        <div style="font-size:9px;letter-spacing:2px;color:var(--ac);font-family:monospace;margin-bottom:3px">${st.sigla}</div>
        <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:7px">${UF_FULL[st.sigla]||st.name}</div>
        <div style="display:flex;justify-content:space-between;gap:14px;font-family:monospace;font-size:11px;color:var(--mt)">
          <span>Shows</span><strong style="color:var(--tx)">${data.count}</strong>
        </div>
        ${data.count>0?`<div style="display:flex;justify-content:space-between;gap:14px;font-family:monospace;font-size:11px;color:var(--mt);margin-top:3px">
          <span>Cachê</span><strong style="color:var(--gn)">${R(data.total)}</strong>
        </div>`:''}`; 
      tip.style.opacity = '1';
      tip.style.left = (e.clientX+14)+'px';
      tip.style.top  = (e.clientY-10)+'px';
    });
    path.addEventListener('mouseleave', () => { tip.style.opacity='0'; });
    path.addEventListener('mouseenter', () => { path.style.filter='brightness(1.4)'; });
    path.addEventListener('mouseleave', () => { path.style.filter=''; tip.style.opacity='0'; });

    svg.appendChild(path);

    // Label
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', st.cx);
    label.setAttribute('y', st.cy);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('dominant-baseline','middle');
    label.setAttribute('font-family',"'DM Sans',sans-serif");
    label.setAttribute('font-size','7');
    label.setAttribute('fill','rgba(230,237,243,0.45)');
    label.setAttribute('pointer-events','none');
    label.textContent = st.sigla;
    svg.appendChild(label);

    // Badge se tem shows
    if(data.count > 0) {
      const circ = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circ.setAttribute('cx', st.cx);
      circ.setAttribute('cy', st.cy-10);
      circ.setAttribute('r','6');
      circ.setAttribute('fill','rgba(63,185,80,0.9)');
      circ.setAttribute('pointer-events','none');
      svg.appendChild(circ);

      const num = document.createElementNS('http://www.w3.org/2000/svg','text');
      num.setAttribute('x', st.cx);
      num.setAttribute('y', st.cy-10);
      num.setAttribute('text-anchor','middle');
      num.setAttribute('dominant-baseline','middle');
      num.setAttribute('font-size','6.5');
      num.setAttribute('font-weight','bold');
      num.setAttribute('fill','#0d1117');
      num.setAttribute('pointer-events','none');
      num.textContent = data.count;
      svg.appendChild(num);
    }
  });
}


// ── RECEITAS ─────────────────────────────────────────────────────
const TIPOS_RECEITA = ['PIX','Transferência','Dinheiro','Boleto','Cheque','Outro'];
const CATS_RECEITA = ['Aporte de sócio','Patrocínio','Publicidade','Venda de produto','Streaming','Cachê extra','Outros'];

async function salvarReceita(form, id=null){
  APP.loading=true;render();
  const newId = 'REC-'+String(APP.receitas.length+1).padStart(3,'0');
  const dados={
    receita_id: form.receita_id||newId,
    data: form.data,
    valor: +form.valor||0,
    categoria: form.categoria||'',
    tipo: form.tipo||'',
    origem: form.origem||'',
    descricao: form.descricao||'',
    user_id: APP.user.id
  };
  let err;
  if(id){({error:err}=await sb.from('receitas').update(dados).eq('id',id));}
  else{({error:err}=await sb.from('receitas').insert(dados));}
  if(err) toast('Erro: '+err.message,'err'); else toast('Receita salva!');
  await carregarDados();APP.loading=false;APP.modal=null;render();
}

async function excluirReceita(id){
  if(!confirm('Excluir esta receita?'))return;
  await sb.from('receitas').delete().eq('id',id);
  toast('Excluída.');await carregarDados();APP.modal=null;render();
}

function buildReceitas(){
  const lista=[...APP.receitas].sort((a,b)=>b.data?.localeCompare(a.data));
  const total=lista.reduce((t,r)=>t+(r.valor||0),0);

  const porCat={};
  lista.forEach(r=>{
    const c=r.categoria||'Outros';
    porCat[c]=(porCat[c]||0)+(r.valor||0);
  });
  const catSorted=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);

  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div>
      <h2 style="font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-.5px">Receitas <span style="color:var(--ac)">Extras</span></h2>
      <p style="font-size:11px;color:var(--mt);margin-top:2px">${lista.length} registros · Total: <strong style="color:var(--gn)">${R2(total)}</strong></p>
    </div>
    ${isAdmin()?`<button class="btn-p" id="btn-add-receita">+ Nova receita</button>`:''}
  </div>

  ${catSorted.length>0?`
  <div class="kpi-grid" style="margin-bottom:12px">
    ${catSorted.slice(0,4).map(([c,v])=>`
    <div class="kpi">
      <div class="kpi-label">${c}</div>
      <div class="kpi-val" style="color:var(--gn);font-size:16px">${R2(v)}</div>
    </div>`).join('')}
  </div>`:''}

  ${lista.length===0?`
  <div class="card" style="text-align:center;padding:28px">
    <div style="font-size:30px;margin-bottom:8px">💰</div>
    <div style="color:var(--mt);font-size:13px">Nenhuma receita cadastrada.</div>
  </div>`:`
  <div class="card" style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Data</th><th>Origem</th><th>Categoria</th><th>Tipo</th><th>Descrição</th><th style="text-align:right">Valor</th>
      </tr></thead>
      <tbody>
        ${lista.map(r=>`<tr id="rec-${r.id}" style="cursor:pointer">
          <td style="font-family:monospace;font-size:11px;white-space:nowrap">${fd(r.data)}</td>
          <td style="font-weight:500">${r.origem||'—'}</td>
          <td><span class="pill" style="background:rgba(63,185,80,.1);color:var(--gn);border:1px solid rgba(63,185,80,.2)">${r.categoria||'—'}</span></td>
          <td style="color:var(--mt);font-size:12px">${r.tipo||'—'}</td>
          <td style="color:var(--mt);font-size:12px">${r.descricao||'—'}</td>
          <td style="text-align:right;color:var(--gn);font-weight:700;font-family:monospace;white-space:nowrap">${R(r.valor)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`}
  `;
}

function buildModalReceita(){
  const f=APP.modal.form, novo=APP.modal.novo;
  return`<div class="overlay" id="overlay"><div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-family:var(--font-head);font-size:16px;font-weight:700">${novo?'Nova receita':'Editar receita'}</span>
      <button class="btn-g" id="btn-fechar" style="padding:5px 10px;font-size:12px">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="grid2">
        <div><span class="lbl">Data *</span><input id="f-data" type="date" value="${f.data||''}"></div>
        <div><span class="lbl">Valor R$ *</span><input id="f-valor" type="number" value="${f.valor||''}" placeholder="0"></div>
      </div>
      <div class="grid2">
        <div><span class="lbl">Tipo *</span><select id="f-tipo"><option value="">Selecione...</option>${TIPOS_RECEITA.map(t=>`<option value="${t}"${f.tipo===t?' selected':''}>${t}</option>`).join('')}</select></div>
        <div><span class="lbl">Categoria</span><select id="f-cat"><option value="">Selecione...</option>${CATS_RECEITA.map(c=>`<option value="${c}"${f.categoria===c?' selected':''}>${c}</option>`).join('')}<option value="Outros"${f.categoria==='Outros'?' selected':''}>Outros</option></select></div>
      </div>
      <div><span class="lbl">Quem aportou / Origem *</span><input id="f-origem" value="${f.origem||''}" placeholder="Ex: João Silva, Patrocinador XYZ..."></div>
      <div><span class="lbl">Descrição</span><input id="f-desc" value="${f.descricao||''}" placeholder="Detalhes adicionais..."></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        ${!novo?`<button class="btn-d" id="btn-del-rec">Excluir</button>`:''}
        <div style="flex:1"></div>
        <button class="btn-g" id="btn-fechar2">Cancelar</button>
        <button class="btn-p" id="btn-salvar-rec" ${APP.loading?'disabled':''}>${APP.loading?'Aguarde...':'Salvar'}</button>
      </div>
    </div>
  </div></div>`;
}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    APP.user=session.user;
    const{data:p}=await sb.from('perfis').select('perfil').eq('id',session.user.id).single();
    APP.role=p?.perfil||'viewer';
    await carregarDados();
  }
  render();
})();
</script>
