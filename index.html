function buildDash(){
  const sh=APP.shows,de=APP.desps;
  const ativos=sh.filter(s=>s.status!=='CANCELADO');
  const rec=sh.filter(s=>s.status==='RECEBIDO');
  const abe=sh.filter(s=>s.status==='ABERTO');
  const con=sh.filter(s=>s.status==='CONFIRMADO');
  const sumC=a=>a.reduce((t,s)=>t+(s.cache||0),0);
  const tB=sumC(ativos),tR=sumC(rec),tA=sumC(abe);
  const tL=ativos.filter(s=>s.cache>0).reduce((t,s)=>t+calcLiq(s),0);
  const tD=de.reduce((t,d)=>t+(d.valor||0),0);
  const tISS=ativos.reduce((t,s)=>t+(s.cache||0)*ISS,0);
  const tNF=ativos.reduce((t,s)=>t+(s.cache||0)*NF,0);
  const tCom=ativos.reduce((t,s)=>t+(s.comissao||0),0);
  const tCu=ativos.reduce((t,s)=>t+(s.custo||0),0);
  const rank=[...sh].filter(s=>s.cache>0&&s.status!=='CANCELADO').map(s=>({...s,l:calcLiq(s)})).sort((a,b)=>b.l-a.l).slice(0,5);
  const maxL=rank[0]?.l||1;
  const mensal=MESES.map((m,i)=>{const ms=sh.filter(s=>s.data&&+s.data.split('-')[1]===i+1&&s.status!=='CANCELADO');return{m,v:ms.reduce((t,s)=>t+(s.cache||0),0),n:ms.length};});

    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    ${[[`Receita bruta`,R2(tB),`${ativos.filter(s=>s.cache>0).length} shows c/ cachê`,'var(--gn)',100],
       [`Cachê líquido`,R2(tL),'Após ISS + NF + comissão','var(--ac)',tB?tL/tB*100:0],
       [`Recebido`,R2(tR),`${rec.length} shows`,'var(--gn)',tB?tR/tB*100:0],
       [`Em aberto`,R2(tA),`${abe.length} shows`,'var(--rd)',tB?tA/tB*100:0],
       [`Saldo real`,R2(tR-tD),'Recebido − Despesas',(tR-tD)>=0?'var(--gn)':'var(--rd)',null],
    ].map(([l,v,s,c,p])=>`
    <div class="kpi">
      <div class="kpi-label">${l}</div>
      <div class="kpi-val" style="color:${c}">${v}</div>
      <div class="kpi-sub">${s}</div>
      ${p!=null?`<div class="bar-track"><div style="height:100%;width:${Math.min(p,100).toFixed(0)}%;background:${c};border-radius:2px;transition:width 1s"></div></div>`:''}
    </div>`).join('')}
  </div>

  <!-- Status + Deduções -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
    <div class="card" style="margin-bottom:0">
      <div class="stitle">Status dos shows</div>
      <div class="st-grid">
        ${[['REC.',rec.length,'var(--gn)'],['ABERTO',abe.length,'var(--rd)'],['CONF.',con.length,'var(--ac)'],
           ['SINAL',sh.filter(s=>s.status==='SINAL PAGO').length,'var(--pu)'],
           ['CANC.',sh.filter(s=>s.status==='CANCELADO').length,'var(--mt)'],['TOTAL',sh.length,'var(--tx)']
        ].map(([l,n,c])=>`<div class="st-card"><div class="st-num" style="color:${c}">${n}</div><div class="st-lbl">${l}</div></div>`).join('')}
      </div>

    <div class="card" style="margin-bottom:0">
      <div class="stitle">Deduções</div>
      ${[['ISS (5%)',tISS,'var(--rd)'],['NF (19%)',tNF,'var(--rd)'],['Comissão',tCom,'#f97316'],['Custo show',tCu,'var(--am)']].map(([l,v,c])=>`
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--bd2);font-size:12px">
        <span style="color:var(--mt)">${l}</span><span style="color:${c};font-weight:600;font-family:monospace">−${R(v)}</span>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;font-weight:700">
        <span>Total deduzido</span><span style="color:var(--rd);font-family:monospace">−${R(tISS+tNF+tCom+tCu)}</span>
      </div>
    </div>
  </div>

  <!-- Gráfico Chart.js -->
  <div class="card">
    <div class="stitle">Receita bruta mensal (R$)</div>
    <div style="height:160px"><canvas id="chartMensal"></canvas></div>
  </div>

  <!-- Meses mini cards -->
  <div class="card">
    <div class="stitle">Receita por mês</div>

      ${mensal.map((x,i)=>`
      <div class="mes-card" style="${x.v>0?'border-color:rgba(56,189,248,.15)':''}">
        <div class="mes-nome">${x.m}</div>
        <div class="mes-val" style="color:${x.v>0?'var(--ac)':'var(--mt)'}">${x.v?'R$'+(x.v/1000).toFixed(0)+'K':'—'}</div>
        <div style="font-size:9px;color:var(--mt);margin-top:2px">${x.n} show${x.n!==1?'s':''}</div>
      </div>`).join('')}
    </div>

  <!-- Ranking top 5 -->
  <div class="card">
    <div class="stitle">🏆 Top 5 shows — cachê líquido</div>

    rank.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:${i<rank.length-1?'0.5px solid var(--bd2)':'none'}">

      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;font-family:var(--font-body);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.local} — ${s.uf}</div>
        <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${(s.l/maxL*100).toFixed(0)}%"></div></div>
      </div>

}

function drawChart(){
  const ctx=document.getElementById('chartMensal');
  if(!ctx)return;
  if(APP.chart){APP.chart.destroy();APP.chart=null;}
  const sh=APP.shows;
  const data=MESES.map((m,i)=>sh.filter(s=>s.data&&+s.data.split('-')[1]===i+1&&s.status!=='CANCELADO').reduce((t,s)=>t+(s.cache||0),0));
  APP.chart=new Chart(ctx,{
    type:'bar',
    data:{labels:MESES,datasets:[{data,backgroundColor:data.map(v=>v>0?'rgba(31,111,235,.75)':'rgba(33,38,45,.6)'),borderRadius:5,borderSkipped:false}]},
    options:{
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+R(c.parsed.y)},backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e',padding:10,cornerRadius:8}},
      scales:{
        x:{ticks:{color:'#8b949e',font:{size:10,family:'DM Sans'}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#8b949e',font:{size:9,family:'DM Sans'},callback:v=>v?`R$${(v/1000).toFixed(0)}K`:''},grid:{color:'rgba(33,38,45,.8)'},border:{display:false}}
      },
      responsive:true,maintainAspectRatio:false,animation:{duration:800}
    }
  });
}

    <button class="filt-btn" id="fst-${f.replace(' ','-')}" style="background:${APP.filtroSt===f?'rgba(88,166,255,.15)':'var(--bg2)'};color:${APP.filtroSt===f?'var(--ac)':'var(--mt)'};border:1px solid ${APP.filtroSt===f?'var(--ac)':'var(--bd2)'}">

function buildDesps(){

  </div>`).join('')}`;

function buildFluxo(){
  let ac=0;
  const rows=MESES.map((m,i)=>{
    const ent=APP.shows.filter(s=>s.status==='RECEBIDO'&&s.data&&+s.data.split('-')[1]===i+1).reduce((t,s)=>t+(s.cache||0),0);
    const sai=APP.desps.filter(d=>d.data&&+d.data.split('-')[1]===i+1).reduce((t,d)=>t+(d.valor||0),0);
    const sal=ent-sai;ac+=sal;return{m,ent,sai,sal,ac};
  });
  const tE=rows.reduce((t,r)=>t+r.ent,0),tS=rows.reduce((t,r)=>t+r.sai,0);
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
    ${[['Entradas',R2(tE),'var(--gn)'],['Saídas',R2(tS),'var(--rd)'],['Saldo',R2(tE-tS),(tE-tS)>=0?'var(--gn)':'var(--rd)']].map(([l,v,c])=>`
    <div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="color:${c};font-size:16px">${v}</div></div>`).join('')}
  </div>
  <div class="card" style="overflow-x:auto">
    <div class="stitle">Fluxo mensal 2026</div>
    <table><thead><tr><th>Mês</th><th style="text-align:right">Entradas</th><th style="text-align:right">Saídas</th><th style="text-align:right">Saldo</th><th style="text-align:right">Acumulado</th></tr></thead>
    <tbody>${rows.map((r,i)=>`<tr>
      <td style="font-weight:500;font-family:var(--font-head)">${MESES[i]}</td>
      <td style="text-align:right;color:${r.ent?'var(--gn)':'var(--mt)'};font-family:monospace">${r.ent?R(r.ent):'—'}</td>
      <td style="text-align:right;color:${r.sai?'var(--rd)':'var(--mt)'};font-family:monospace">${r.sai?'−'+R(r.sai):'—'}</td>
      <td style="text-align:right;color:${r.sal>0?'var(--gn)':r.sal<0?'var(--rd)':'var(--mt)'};font-weight:600;font-family:monospace">${r.sal===0?'—':(r.sal<0?'−':'')+R(Math.abs(r.sal))}</td>
      <td style="text-align:right;color:${r.ac>=0?'var(--ac)':'var(--rd)'};font-weight:700;font-family:monospace">${R(r.ac)}</td>
    </tr>`).join('')}</tbody></table>
  </div>`;
}

function bindEvents(){
  // LOGIN
  const bE=document.getElementById('btn-entrar');
  if(bE)bE.onclick=async()=>{
    const email=document.getElementById('l-email')?.value;
    const senha=document.getElementById('l-senha')?.value;
    if(!email||!senha){toast('Preencha e-mail e senha.','err');return;}
    APP.loading=true;render();
    const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
    APP.loading=false;
    if(error){toast('E-mail ou senha incorretos.','err');render();return;}
    APP.user=data.user;
    const{data:p}=await sb.from('perfis').select('role').eq('id',data.user.id).single();
    APP.role=p?.role||'viewer';
    await carregarDados();render();
  };
  const bIC=document.getElementById('btn-ir-cadastro');
  if(bIC)bIC.onclick=()=>{document.getElementById('cadastro-form').style.display='block';document.getElementById('login-form').style.display='none';};
  const bC=document.getElementById('btn-cadastrar');
  if(bC)bC.onclick=async()=>{
    const nome=document.getElementById('c-nome')?.value;
    const email=document.getElementById('c-email')?.value;
    const senha=document.getElementById('c-senha')?.value;
    if(!email||!senha){toast('Preencha e-mail e senha.','err');return;}
    const{error}=await sb.auth.signUp({email,password:senha,options:{data:{nome,role:'viewer'}}});
    if(error){toast(error.message,'err');render();return;}
    toast('Conta criada! Verifique seu e-mail.');render();
  };
  // SAIR
  const bS=document.getElementById('btn-sair');
  if(bS)bS.onclick=async()=>{if(APP.chart){APP.chart.destroy();APP.chart=null;}await sb.auth.signOut();APP.user=null;APP.role=null;APP.shows=[];APP.desps=[];APP.tab='dash';render();};
  // NAV
  ['dash','shows','desps','fluxo'].forEach(t=>{const el=document.getElementById('nav-'+t);if(el)el.onclick=()=>{APP.tab=t;render();};});
  // FILTROS
  ['todos','CONFIRMADO','ABERTO','RECEBIDO','SINAL PAGO','CANCELADO'].forEach(f=>{const el=document.getElementById('fst-'+f.replace(' ','-'));if(el)el.onclick=()=>{APP.filtroSt=f;render();};});
  // IMPORTAR
  const bI=document.getElementById('btn-importar');if(bI)bI.onclick=importarShowsPadrao;
  // ADD SHOW
  const bAS=document.getElementById('btn-add-show');if(bAS)bAS.onclick=()=>{APP.modal={tipo:'show',novo:true,form:{status:'CONFIRMADO',uf:'CE',show_id:newSid()}};render();};
  // CLICK SHOW
  APP.shows.forEach(s=>{const el=document.getElementById('show-'+s.id);if(el)el.onclick=()=>{if(isAdmin()){APP.modal={tipo:'show',novo:false,form:{...s}};render();}else toast('Modo visualização.','err');};});
  // ADD DESP
  const bAD=document.getElementById('btn-add-desp');if(bAD)bAD.onclick=()=>{APP.modal={tipo:'desp',novo:true,form:{desp_id:newDid()}};render();};
  // CLICK DESP
  APP.desps.forEach(d=>{const el=document.getElementById('desp-'+d.id);if(el)el.onclick=()=>{if(isAdmin()){APP.modal={tipo:'desp',novo:false,form:{...d}};render();}};});
  // FECHAR
  const fechar=()=>{APP.modal=null;render();};
  ['btn-fechar','btn-fechar2'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=fechar;});
  const ov=document.getElementById('overlay');if(ov)ov.onclick=e=>{if(e.target===ov)fechar();};
  // SALVAR SHOW
  const bSS=document.getElementById('btn-salvar-show');
  if(bSS)bSS.onclick=()=>{
    const f=APP.modal.form;
    f.local=document.getElementById('f-local')?.value||'';f.uf=document.getElementById('f-uf')?.value||'CE';
    f.data=document.getElementById('f-data')?.value||'';f.status=document.getElementById('f-status')?.value||'CONFIRMADO';
    f.cache=+(document.getElementById('f-cache')?.value||0);f.comissao=+(document.getElementById('f-comissao')?.value||0);
    f.custo=+(document.getElementById('f-custo')?.value||0);f.sinal=+(document.getElementById('f-sinal')?.value||0);
    f.obs=document.getElementById('f-obs')?.value||'';
    if(!f.local||!f.data){toast('Preencha Local e Data.','err');return;}
    salvarShow(f,APP.modal.novo?null:APP.modal.form.id);
  };
  const bDS=document.getElementById('btn-del-show');if(bDS)bDS.onclick=()=>excluirShow(APP.modal.form.id);
  // SALVAR DESP
  const bSD=document.getElementById('btn-salvar-desp');
  if(bSD)bSD.onclick=()=>{
    const f=APP.modal.form;
    f.data=document.getElementById('f-data')?.value||'';f.valor=+(document.getElementById('f-valor')?.value||0);
    f.categoria=document.getElementById('f-cat')?.value||'';f.descricao=document.getElementById('f-desc')?.value||'';
    f.show_ref=document.getElementById('f-show')?.value||'';
    if(!f.data||!f.categoria||!f.valor){toast('Preencha Data, Categoria e Valor.','err');return;}
    salvarDesp(f,APP.modal.novo?null:APP.modal.form.id);
  };
  const bDD=document.getElementById('btn-del-desp');if(bDD)bDD.onclick=()=>excluirDesp(APP.modal.form.id);
}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    APP.user=session.user;
    const{data:p}=await sb.from('perfis').select('role').eq('id',session.user.id).single();
    APP.role=p?.role||'viewer';
    await carregarDados();
  }
  render();
})();
</script>
</body>
</html>
