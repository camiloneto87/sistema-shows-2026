input,select{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:13px;outline:none;width:100%;font-family:inherit}
input:focus,select:focus{border-color:var(--ac)}
button{cursor:pointer;font-family:inherit;transition:opacity .15s;border:none}
button:hover:not(:disabled){opacity:.8}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--ac);color:#0d1117;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600}
.btn-g{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 18px;font-size:13px}
.btn-d{background:#7f1d1d33;border:1px solid var(--rd);color:var(--rd);border-radius:8px;padding:9px 18px;font-size:13px}

.stitle{font-size:10px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:11px;color:var(--mt);font-weight:500;display:block;margin-bottom:4px}

.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;padding:20px 18px 32px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 8px;color:var(--mt);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;border-bottom:1px solid var(--bd2);white-space:nowrap;text-align:left}
td{padding:8px;border-bottom:1px solid #21262d55;vertical-align:middle}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.nav{background:var(--bg2);border-bottom:1px solid var(--bd2);display:flex}
.nav-btn{flex:1;padding:10px 4px;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;font-weight:600;cursor:pointer}
.content{padding:12px;max-width:660px;margin:0 auto;padding-bottom:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:10px}
.kpi{background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:12px 14px}
.bar-track{height:3px;background:#fff1;border-radius:2px;margin-top:8px;overflow:hidden}
.show-card{background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:border-color .15s}
.show-card:hover{border-color:var(--bd)}
.filt-btn{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;margin-right:5px;margin-bottom:6px}
.row-space{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.preview-box{background:var(--bg3);border-radius:8px;padding:10px;font-size:12px;margin-top:4px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px}

.alert-ok{background:#14532d33;border:1px solid var(--gn);color:var(--gn)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 1s linear infinite;display:inline-block}

// ══════════════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════════════
let APP={user:null,role:null,tab:'dash',shows:[],desps:[],modal:null,filtroSt:'todos',loading:false,flash:'',toastTimer:null};

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
const R=v=>'R$\u00a0'+Math.round(v||0).toLocaleString('pt-BR');
const fd=d=>{if(!d)return'—';const[y,m,di]=d.split('-');return`${di}/${m}/${y}`;};
const calcLiq=s=>(s.cache||0)*(1-ISS-NF)-(s.comissao||0)-(s.custo||0);
const pill=st=>{const[bg,c,b]=PCORES[st]||PCORES.CANCELADO;return`<span class="pill" style="background:${bg};color:${c};border:1px solid ${b}">${st}</span>`;};
const newSid=()=>`SHOW-${String(Math.max(0,...APP.shows.map(s=>+s.show_id.split('-')[1]))+1).padStart(3,'0')}`;
const newDid=()=>`DESP-${String(APP.desps.length+1).padStart(3,'0')}`;
const toast=(msg,tipo='ok')=>{APP.flash={msg,tipo};render();clearTimeout(APP.toastTimer);APP.toastTimer=setTimeout(()=>{APP.flash='';render();},2500);};
const isAdmin=()=>APP.role==='admin';

// ══════════════════════════════════════════════════════
//  SUPABASE — OPERAÇÕES
// ══════════════════════════════════════════════════════
async function carregarDados(){
  const[{data:sh},{data:de}]=await Promise.all([
    sb.from('shows').select('*').order('data'),
    sb.from('despesas').select('*').order('data',{ascending:false}),
  ]);
  APP.shows=sh||[];
  APP.desps=de||[];
}

async function salvarShow(form,id=null){
  APP.loading=true;render();
  const dados={show_id:form.show_id,data:form.data,local:form.local,uf:form.uf,cache:+form.cache||0,comissao:+form.comissao||0,custo:+form.custo||0,sinal:+form.sinal||0,status:form.status,obs:form.obs||'',user_id:APP.user.id};
  let err;
  if(id){({error:err}=await sb.from('shows').update(dados).eq('id',id));}
  else{({error:err}=await sb.from('shows').insert(dados));}
  if(err){toast('Erro ao salvar: '+err.message,'err');}
  else{toast('Show salvo com sucesso!');}
  await carregarDados();
  APP.loading=false;APP.modal=null;render();
}

async function excluirShow(id){
  if(!confirm('Excluir este show?'))return;
  await sb.from('shows').delete().eq('id',id);
  toast('Show excluído.');
  await carregarDados();
  APP.modal=null;render();
}

async function salvarDesp(form,id=null){
  APP.loading=true;render();
  const dados={desp_id:form.desp_id,data:form.data,categoria:form.categoria,descricao:form.descricao||'',valor:+form.valor||0,show_ref:form.show_ref||'',user_id:APP.user.id};
  let err;
  if(id){({error:err}=await sb.from('despesas').update(dados).eq('id',id));}
  else{({error:err}=await sb.from('despesas').insert(dados));}
  if(err){toast('Erro: '+err.message,'err');}
  else{toast('Despesa salva!');}
  await carregarDados();
  APP.loading=false;APP.modal=null;render();
}

async function excluirDesp(id){
  if(!confirm('Excluir esta despesa?'))return;
  await sb.from('despesas').delete().eq('id',id);
  toast('Despesa excluída.');
  await carregarDados();
  APP.modal=null;render();
}

async function importarShowsIniciais(){
  if(!confirm(`Importar os ${SHOWS_INICIAIS.length} shows da planilha para o banco de dados?`))return;
  APP.loading=true;render();
  const dados=SHOWS_INICIAIS.map(s=>({...s,user_id:APP.user.id}));
  const{error}=await sb.from('shows').insert(dados);
  if(error){toast('Erro na importação: '+error.message,'err');}
  else{toast(`${SHOWS_INICIAIS.length} shows importados com sucesso!`);}
  await carregarDados();
  APP.loading=false;render();
}

// ══════════════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════════════
function render(){document.getElementById('app').innerHTML=buildHTML();bindEvents();}

function buildHTML(){
  if(!APP.user)return buildLogin();
  return`
    ${buildHeader()}
    ${buildNav()}
    <div class="content">
      ${APP.flash?`<div class="alert alert-${APP.flash.tipo==='err'?'err':'ok'}">${APP.flash.msg}</div>`:''}
      ${APP.tab==='dash'?buildDash():APP.tab==='shows'?buildShows():APP.tab==='desps'?buildDesps():buildFluxo()}
    </div>
    ${APP.modal?buildModal():''}`;
}

// ── DASHBOARD ──────────────────────────────────────────
function buildDash(){
  const sh=APP.shows,de=APP.desps;
  const ativos=sh.filter(s=>s.status!=='CANCELADO');
  const rec=sh.filter(s=>s.status==='RECEBIDO');
  const abe=sh.filter(s=>s.status==='ABERTO');
  const con=sh.filter(s=>s.status==='CONFIRMADO');
  const sumC=a=>a.reduce((t,s)=>t+(s.cache||0),0);
  const tB=sumC(ativos),tR=sumC(rec),tA=sumC(abe);
  const tL=ativos.filter(s=>s.cache>0).reduce((t,s)=>t+calcLiq(s),0);
  const tD=de.reduce((t,d)=>t+(d.valor||0),0);
  const tISS=ativos.reduce((t,s)=>t+(s.cache||0)*ISS,0);
  const tNF=ativos.reduce((t,s)=>t+(s.cache||0)*NF,0);
  const tCom=ativos.reduce((t,s)=>t+(s.comissao||0),0);
  const tCu=ativos.reduce((t,s)=>t+(s.custo||0),0);
  const rank=[...sh].filter(s=>s.cache>0&&s.status!=='CANCELADO').map(s=>({...s,l:calcLiq(s)})).sort((a,b)=>b.l-a.l).slice(0,5);
  const maxL=rank[0]?.l||1;
  const mensal=MESES.map((m,i)=>{const ms=sh.filter(s=>s.data&&+s.data.split('-')[1]===i+1&&s.status!=='CANCELADO');return{m,v:ms.reduce((t,s)=>t+(s.cache||0),0)};});
  const maxBar=Math.max(...mensal.map(x=>x.v),1);
  const porCat=CATS.map(c=>({c,v:de.filter(d=>d.categoria===c).reduce((t,d)=>t+(d.valor||0),0)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);

  return`
  ${sh.length===0&&isAdmin()?`<div class="card" style="text-align:center;padding:20px;margin-bottom:10px">
    <div style="font-size:24px;margin-bottom:8px">📋</div>
    <div style="font-size:13px;color:var(--mt);margin-bottom:12px">Banco de dados vazio. Importe os shows da planilha para começar.</div>
    <button id="btn-importar" class="btn-p">Importar 21 shows da planilha</button>
  </div>`:''}
  <div class="kpi-grid">
    ${[[`Receita bruta`,R(tB),`${ativos.filter(s=>s.cache>0).length} shows`,'var(--gn)',100],
       [`Cachê líquido`,R(tL),'Após deduções','var(--ac)',tB?tL/tB*100:0],
       [`Recebido`,R(tR),`${rec.length} shows`,'var(--gn)',tB?tR/tB*100:0],
       [`Em aberto`,R(tA),`${abe.length} shows`,'var(--rd)',tB?tA/tB*100:0],
       [`Saldo real`,R(tR-tD),'Recebido−Despesas',(tR-tD)>=0?'var(--gn)':'var(--rd)',null],
    ].map(([l,v,s,c,p])=>`
    <div class="kpi">
      <div class="stitle" style="margin-bottom:3px">${l}</div>

// ── SHOWS ──────────────────────────────────────────────
function buildShows(){
  const lista=APP.shows.filter(s=>APP.filtroSt==='todos'||s.status===APP.filtroSt).sort((a,b)=>a.data?.localeCompare(b.data));
  return`
  ${isAdmin()?`<div class="row-space"><button class="btn-p" id="btn-add-show">+ Novo show</button></div>`:''}
  <div style="margin-bottom:10px;display:flex;flex-wrap:wrap">
    ${['todos','CONFIRMADO','ABERTO','RECEBIDO','SINAL PAGO','CANCELADO'].map(f=>`
    <button class="filt-btn" id="fst-${f.replace(' ','-')}" style="background:${APP.filtroSt===f?'#58a6ff22':'var(--bg2)'};color:${APP.filtroSt===f?'var(--ac)':'var(--mt)'};border:1px solid ${APP.filtroSt===f?'var(--ac)':'var(--bd2)'}">
      ${f==='todos'?'Todos':f}${f!=='todos'?` (${APP.shows.filter(s=>s.status===f).length})`:''}
    </button>`).join('')}
  </div>
  ${lista.length===0?'<div class="card" style="text-align:center;color:var(--mt);padding:20px">Nenhum show neste filtro.</div>':
  lista.map(s=>`<div class="show-card" id="show-${s.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
      <div><span style="font-size:10px;color:var(--mt);font-family:monospace">${s.show_id} · </span><span style="font-size:14px;font-weight:600">${s.local}</span><span style="font-size:12px;color:var(--mt)"> — ${s.uf}</span></div>
      ${pill(s.status)}
    </div>
    <div style="display:flex;gap:12px;font-size:12px;color:var(--mt);flex-wrap:wrap">
      <span>📅 ${fd(s.data)}</span>
      ${s.cache>0?`<span style="color:var(--gn);font-weight:600">${R(s.cache)}</span>`:''}
      ${s.cache>0?`<span style="color:var(--ac)">Líq: ${R(calcLiq(s))}</span>`:''}

    </div>
  </div>`).join('')}`;
}

// ── DESPESAS ───────────────────────────────────────────
function buildDesps(){
  const lista=[...APP.desps].sort((a,b)=>b.data?.localeCompare(a.data));
  const total=lista.reduce((t,d)=>t+(d.valor||0),0);
  return`
  <div class="row-space" style="justify-content:space-between">
    ${total>0?`<span style="font-size:12px;color:var(--rd);font-weight:600;font-family:monospace">Total: ${R(total)}</span>`:'<span></span>'}
    ${isAdmin()?`<button class="btn-p" id="btn-add-desp">+ Nova despesa</button>`:''}
  </div>
  ${lista.length===0?`<div class="card" style="text-align:center;padding:28px"><div style="font-size:30px;margin-bottom:8px">💸</div><div style="color:var(--mt);font-size:13px">Nenhuma despesa cadastrada.</div></div>`:
  lista.map(d=>`<div class="show-card" id="desp-${d.id}" style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:13px;font-weight:500">${d.descricao||d.categoria}</div><div style="font-size:11px;color:var(--mt)">📅 ${fd(d.data)} · ${d.categoria}${d.show_ref?' · '+d.show_ref:''}</div></div>
    <span style="color:var(--rd);font-weight:700;font-family:monospace;white-space:nowrap;margin-left:12px">−${R(d.valor)}</span>
  </div>`).join('')}`;
}

// ── FLUXO ──────────────────────────────────────────────
function buildFluxo(){
  let ac=0;
  const rows=MESES.map((m,i)=>{
    const ent=APP.shows.filter(s=>s.status==='RECEBIDO'&&s.data&&+s.data.split('-')[1]===i+1).reduce((t,s)=>t+(s.cache||0),0);
    const sai=APP.desps.filter(d=>d.data&&+d.data.split('-')[1]===i+1).reduce((t,d)=>t+(d.valor||0),0);
    const sal=ent-sai;ac+=sal;return{m,ent,sai,sal,ac};
  });
  const tE=rows.reduce((t,r)=>t+r.ent,0),tS=rows.reduce((t,r)=>t+r.sai,0);
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
    ${[['Entradas',R(tE),'var(--gn)'],['Saídas',R(tS),'var(--rd)'],['Saldo',R(tE-tS),(tE-tS)>=0?'var(--gn)':'var(--rd)']].map(([l,v,c])=>`
    <div class="kpi"><div class="stitle">${l}</div><div style="font-size:16px;font-weight:700;color:${c};font-family:monospace">${v}</div></div>`).join('')}
  </div>
  <div class="card" style="overflow-x:auto">
    <div class="stitle">Fluxo mensal 2026</div>
    <table><thead><tr>
      <th>Mês</th><th style="text-align:right">Entradas</th><th style="text-align:right">Saídas</th><th style="text-align:right">Saldo</th><th style="text-align:right">Acumulado</th>
    </tr></thead><tbody>
    ${rows.map((r,i)=>`<tr>
      <td style="font-weight:500">${MESES[i]}</td>
      <td style="text-align:right;color:${r.ent?'var(--gn)':'var(--mt)'};font-family:monospace">${r.ent?R(r.ent):'—'}</td>
      <td style="text-align:right;color:${r.sai?'var(--rd)':'var(--mt)'};font-family:monospace">${r.sai?'−'+R(r.sai):'—'}</td>
      <td style="text-align:right;color:${r.sal>0?'var(--gn)':r.sal<0?'var(--rd)':'var(--mt)'};font-weight:600;font-family:monospace">${r.sal===0?'—':(r.sal<0?'−':'')+R(Math.abs(r.sal))}</td>
      <td style="text-align:right;color:${r.ac>=0?'var(--ac)':'var(--rd)'};font-weight:700;font-family:monospace">${R(r.ac)}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;
}

// ── MODAIS ─────────────────────────────────────────────

  if(APP.modal.tipo==='desp')return buildModalDesp();
  return'';
}

  return`<div class="overlay" id="overlay"><div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:16px;font-weight:600">${novo?'Novo show':'Editar show'}</span>

    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="grid2">

        <div><span class="lbl">UF *</span><select id="f-uf">${UFS.map(u=>`<option value="${u}"${f.uf===u?' selected':''}>${u}</option>`).join('')}</select></div>

      </div>
      <div class="grid2">
        <div><span class="lbl">Cachê bruto (R$)</span><input id="f-cache" type="number" value="${f.cache||''}" placeholder="0"></div>
        <div><span class="lbl">Comissão (R$)</span><input id="f-comissao" type="number" value="${f.comissao||''}" placeholder="0"></div>
      </div>
      <div class="grid2">
        <div><span class="lbl">Custo variável (R$)</span><input id="f-custo" type="number" value="${f.custo||''}" placeholder="0"></div>
        <div><span class="lbl">Sinal recebido (R$)</span><input id="f-sinal" type="number" value="${f.sinal||''}" placeholder="0"></div>
      </div>
      <div><span class="lbl">Observação</span><input id="f-obs" value="${f.obs||''}" placeholder="Ex: cachê parcelado..."></div>

        ${[['Cachê bruto',c,'var(--tx)'],['ISS 5%',-i_,'var(--rd)'],['NF 19%',-n_,'var(--rd)'],['Comissão',-com,'#f97316'],['Custo',-cu,'var(--am)']].map(([lb,v,cl])=>`
        <div style="display:flex;justify-content:space-between;padding:2px 0"><span style="color:var(--mt)">${lb}</span><span style="color:${cl};font-family:monospace">${v<0?'−':''}${R(Math.abs(v))}</span></div>`).join('')}

          <span>Cachê líquido</span><span style="color:${l_>=0?'var(--gn)':'var(--rd)'};font-family:monospace">${R(l_)}</span>
        </div>
      </div>`:''}
      <div style="display:flex;gap:8px;margin-top:4px">
        ${!novo?`<button class="btn-d" id="btn-del-show">Excluir</button>`:''}

// ══════════════════════════════════════════════════════
//  BIND EVENTS
// ══════════════════════════════════════════════════════
function bindEvents(){
  // LOGIN
  const btnEntrar=document.getElementById('btn-entrar');
  if(btnEntrar) btnEntrar.onclick=async()=>{
    const email=document.getElementById('l-email')?.value;
    const senha=document.getElementById('l-senha')?.value;
    if(!email||!senha){toast('Preencha e-mail e senha.','err');return;}
    APP.loading=true;render();
    const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
    APP.loading=false;
    if(error){toast('E-mail ou senha incorretos.','err');render();return;}
    APP.user=data.user;
    const{data:p}=await sb.from('perfis').select('role').eq('id',data.user.id).single();
    APP.role=p?.role||'viewer';
    await carregarDados();
    render();
  };

  const btnIrCadastro=document.getElementById('btn-ir-cadastro');
  if(btnIrCadastro) btnIrCadastro.onclick=()=>{
    document.getElementById('cadastro-form').style.display='block';
    document.getElementById('login-form').style.display='none';
  };

  const btnCadastrar=document.getElementById('btn-cadastrar');
  if(btnCadastrar) btnCadastrar.onclick=async()=>{
    const nome=document.getElementById('c-nome')?.value;
    const email=document.getElementById('c-email')?.value;
    const senha=document.getElementById('c-senha')?.value;
    if(!email||!senha){toast('Preencha e-mail e senha.','err');return;}
    APP.loading=true;render();
    const{error}=await sb.auth.signUp({email,password:senha,options:{data:{nome,role:'viewer'}}});
    APP.loading=false;
    if(error){toast(error.message,'err');render();return;}
    toast('Conta criada! Verifique seu e-mail para confirmar.');
    render();
  };

  // SAIR
  const btnSair=document.getElementById('btn-sair');
  if(btnSair) btnSair.onclick=async()=>{await sb.auth.signOut();APP.user=null;APP.role=null;APP.shows=[];APP.desps=[];APP.tab='dash';render();};

  // NAV
  ['dash','shows','desps','fluxo'].forEach(t=>{
    const el=document.getElementById('nav-'+t);
    if(el) el.onclick=()=>{APP.tab=t;render();};
  });

  // FILTROS SHOW
  ['todos','CONFIRMADO','ABERTO','RECEBIDO','SINAL PAGO','CANCELADO'].forEach(f=>{
    const el=document.getElementById('fst-'+f.replace(' ','-'));
    if(el) el.onclick=()=>{APP.filtroSt=f;render();};
  });

  // IMPORTAR SHOWS
  const btnImportar=document.getElementById('btn-importar');
  if(btnImportar) btnImportar.onclick=importarShowsIniciais;

  // ADD SHOW
  const btnAddShow=document.getElementById('btn-add-show');
  if(btnAddShow) btnAddShow.onclick=()=>{APP.modal={tipo:'show',novo:true,form:{status:'CONFIRMADO',uf:'CE',show_id:newSid()}};render();};

  // CLICK EM SHOW
  APP.shows.forEach(s=>{
    const el=document.getElementById('show-'+s.id);
    if(el) el.onclick=()=>{
      if(isAdmin()) APP.modal={tipo:'show',novo:false,form:{...s}};
      else toast('Modo visualização — sem permissão para editar.','err');
      render();
    };
  });

  // ADD DESP
  const btnAddDesp=document.getElementById('btn-add-desp');
  if(btnAddDesp) btnAddDesp.onclick=()=>{APP.modal={tipo:'desp',novo:true,form:{desp_id:newDid()}};render();};

  // CLICK EM DESPESA
  APP.desps.forEach(d=>{
    const el=document.getElementById('desp-'+d.id);
    if(el) el.onclick=()=>{
      if(isAdmin()) APP.modal={tipo:'desp',novo:false,form:{...d}};
      render();
    };
  });

  // FECHAR MODAL
  const fechar=()=>{APP.modal=null;render();};
  ['btn-fechar','btn-fechar2'].forEach(id=>{const el=document.getElementById(id);if(el)el.onclick=fechar;});
  const overlay=document.getElementById('overlay');
  if(overlay) overlay.onclick=e=>{if(e.target===overlay)fechar();};

  // SALVAR SHOW
  const btnSalvarShow=document.getElementById('btn-salvar-show');
  if(btnSalvarShow) btnSalvarShow.onclick=()=>{
    const f=APP.modal.form;
    f.local    =document.getElementById('f-local')?.value||'';
    f.uf       =document.getElementById('f-uf')?.value||'CE';
    f.data     =document.getElementById('f-data')?.value||'';
    f.status   =document.getElementById('f-status')?.value||'CONFIRMADO';
    f.cache    =+(document.getElementById('f-cache')?.value||0);
    f.comissao =+(document.getElementById('f-comissao')?.value||0);
    f.custo    =+(document.getElementById('f-custo')?.value||0);
    f.sinal    =+(document.getElementById('f-sinal')?.value||0);
    f.obs      =document.getElementById('f-obs')?.value||'';
    if(!f.local||!f.data){toast('Preencha Local e Data.','err');return;}
    salvarShow(f, APP.modal.novo?null:APP.modal.form.id);
  };

  // EXCLUIR SHOW
  const btnDelShow=document.getElementById('btn-del-show');
  if(btnDelShow) btnDelShow.onclick=()=>excluirShow(APP.modal.form.id);

  // SALVAR DESPESA
  const btnSalvarDesp=document.getElementById('btn-salvar-desp');
  if(btnSalvarDesp) btnSalvarDesp.onclick=()=>{
    const f=APP.modal.form;
    f.data      =document.getElementById('f-data')?.value||'';
    f.valor     =+(document.getElementById('f-valor')?.value||0);
    f.categoria =document.getElementById('f-cat')?.value||'';
    f.descricao =document.getElementById('f-desc')?.value||'';
    f.show_ref  =document.getElementById('f-show')?.value||'';
    if(!f.data||!f.categoria||!f.valor){toast('Preencha Data, Categoria e Valor.','err');return;}
    salvarDesp(f, APP.modal.novo?null:APP.modal.form.id);
  };

  // EXCLUIR DESPESA
  const btnDelDesp=document.getElementById('btn-del-desp');
  if(btnDelDesp) btnDelDesp.onclick=()=>excluirDesp(APP.modal.form.id);
}

// ══════════════════════════════════════════════════════
//  INIT — verificar sessão ativa
// ══════════════════════════════════════════════════════
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    APP.user=session.user;
    const{data:p}=await sb.from('perfis').select('role').eq('id',session.user.id).single();
    APP.role=p?.role||'viewer';
    await carregarDados();
  }
  render();
})();
</script>
</body>
</html>
